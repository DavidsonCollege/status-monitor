<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Monitor - Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --border: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --radius: 8px;
            --green: #2fcc66;
            --yellow: #f1c40f;
            --orange: #e67e22;
            --red: #e74c3c;
            --blue: #3498db;
            --gray: #95a5a6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1 span { font-size: 28px; }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .header-meta .legend {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Team sections */
        .team-section {
            margin-bottom: 32px;
        }

        .team-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .team-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .team-summary {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        .team-summary .count-badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-green { background: rgba(47, 204, 102, 0.15); color: var(--green); }
        .badge-yellow { background: rgba(241, 196, 15, 0.15); color: var(--yellow); }
        .badge-orange { background: rgba(230, 126, 34, 0.15); color: var(--orange); }
        .badge-red { background: rgba(231, 76, 60, 0.15); color: var(--red); }
        .badge-blue { background: rgba(52, 152, 219, 0.15); color: var(--blue); }

        /* Status grid */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .status-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
            overflow: hidden;
        }

        .status-card:hover {
            background: var(--surface-hover);
            transform: translateY(-1px);
        }

        .status-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            border-radius: 4px 0 0 4px;
        }

        .status-card.operational::before { background: var(--green); }
        .status-card.degraded::before { background: var(--yellow); }
        .status-card.partial_outage::before { background: var(--orange); }
        .status-card.major_outage::before { background: var(--red); }
        .status-card.maintenance::before { background: var(--blue); }
        .status-card.unknown::before { background: var(--gray); }

        .card-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .card-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .card-name {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.operational { background: var(--green); }
        .status-dot.degraded { background: var(--yellow); }
        .status-dot.partial_outage { background: var(--orange); }
        .status-dot.major_outage { background: var(--red); }
        .status-dot.maintenance { background: var(--blue); }
        .status-dot.unknown { background: var(--gray); }

        .status-label {
            color: var(--text-muted);
        }

        .status-label.operational { color: var(--green); }
        .status-label.degraded { color: var(--yellow); }
        .status-label.partial_outage { color: var(--orange); }
        .status-label.major_outage { color: var(--red); }
        .status-label.maintenance { color: var(--blue); }

        .card-incidents {
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Detail drawer */
        .drawer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
        }

        .drawer-overlay.open { display: block; }

        .drawer {
            position: fixed;
            top: 0;
            right: -500px;
            width: 500px;
            max-width: 90vw;
            height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 101;
            transition: right 0.25s ease;
            overflow-y: auto;
            padding: 24px;
        }

        .drawer.open { right: 0; }

        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .drawer-header h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
        }

        .drawer-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .drawer-close:hover { color: var(--text); }

        .drawer-status-bar {
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .drawer-status-bar.operational { background: rgba(47,204,102,0.1); color: var(--green); }
        .drawer-status-bar.degraded { background: rgba(241,196,15,0.1); color: var(--yellow); }
        .drawer-status-bar.partial_outage { background: rgba(230,126,34,0.1); color: var(--orange); }
        .drawer-status-bar.major_outage { background: rgba(231,76,60,0.1); color: var(--red); }
        .drawer-status-bar.maintenance { background: rgba(52,152,219,0.1); color: var(--blue); }
        .drawer-status-bar.unknown { background: rgba(149,165,166,0.1); color: var(--gray); }

        .drawer-section-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin: 20px 0 10px;
        }

        .component-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .component-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--bg);
            border-radius: 6px;
            font-size: 13px;
        }

        .component-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .incident-card {
            background: var(--bg);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 3px solid var(--gray);
        }

        .incident-card.investigating { border-left-color: var(--red); }
        .incident-card.identified { border-left-color: var(--orange); }
        .incident-card.monitoring { border-left-color: var(--yellow); }
        .incident-card.resolved { border-left-color: var(--green); }
        .incident-card.maintenance { border-left-color: var(--blue); }

        .incident-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .incident-title a {
            color: var(--accent);
            text-decoration: none;
        }

        .incident-title a:hover { text-decoration: underline; }

        .incident-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .incident-update {
            font-size: 13px;
            color: var(--text-muted);
            padding: 6px 0;
            border-top: 1px solid var(--border);
        }

        .incident-update:first-child { border-top: none; }

        .feed-event {
            padding: 10px 12px;
            background: var(--bg);
            border-radius: 6px;
            margin-bottom: 6px;
            border-left: 3px solid var(--gray);
        }

        .feed-event .event-title {
            font-size: 13px;
            font-weight: 500;
        }

        .feed-event .event-date {
            font-size: 11px;
            color: var(--text-muted);
        }

        .feed-event .event-summary {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .status-link {
            display: inline-block;
            margin-top: 12px;
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
        }

        .status-link:hover { text-decoration: underline; }

        .last-checked {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Setup banner */
        .setup-banner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
        }

        .setup-banner h3 { margin-bottom: 8px; }

        .setup-banner input {
            width: 100%;
            max-width: 500px;
            margin: 8px 0;
            padding: 8px 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }

        button, .btn {
            padding: 8px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
        }

        button:hover { background: var(--surface-hover); }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
        }

        .btn-primary:hover { background: var(--accent-hover); }

        /* Component filter in drawer */
        .component-filter {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .component-filter input {
            flex: 1;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
        }

        .component-filter input:focus { outline: none; border-color: var(--accent); }

        .filter-toggle {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .filter-toggle.active {
            background: rgba(231, 76, 60, 0.15);
            color: var(--red);
            border-color: var(--red);
        }

        .component-row.hidden { display: none; }

        /* Management mode */
        .manage-btn {
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
        }

        .manage-btn:hover { color: var(--text); background: var(--surface); }
        .manage-btn.active { color: var(--accent); border-color: var(--accent); }

        .add-team-btn, .add-product-btn {
            display: none;
            padding: 6px 14px;
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            margin-top: 8px;
        }

        .add-team-btn:hover, .add-product-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
        }

        body.manage-mode .add-team-btn,
        body.manage-mode .add-product-btn { display: block; }

        .edit-overlay {
            display: none;
            position: absolute;
            top: 4px;
            right: 4px;
            gap: 4px;
        }

        body.manage-mode .status-card .edit-overlay { display: flex; }
        body.manage-mode .team-header .edit-overlay { display: flex; }

        .edit-overlay button {
            padding: 2px 6px;
            font-size: 11px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
        }

        .edit-overlay button:hover { color: var(--text); }
        .edit-overlay button.delete-btn:hover { color: var(--red); border-color: var(--red); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            width: 500px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h3 { margin-bottom: 16px; font-size: 18px; }

        .modal .form-group { margin-bottom: 14px; }
        .modal .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .modal input, .modal select, .modal textarea {
            width: 100%;
            padding: 8px 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }

        .modal textarea { min-height: 60px; resize: vertical; }
        .modal input:focus, .modal select:focus { outline: none; border-color: var(--accent); }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-danger { background: var(--red); border-color: var(--red); color: #fff; }
        .btn-danger:hover { background: #c0392b; }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 20px;
            color: var(--text);
            font-size: 14px;
            z-index: 300;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
        }

        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { border-color: var(--red); color: var(--red); }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .status-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
            .header-meta .legend { display: none; }
            .drawer { width: 100vw; max-width: 100vw; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><span>📡</span> Status Monitor</h1>
        <div class="header-meta">
            <button class="manage-btn" id="manageBtn" onclick="toggleManageMode()">✏️ Manage</button>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Operational</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> Degraded</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> Partial Outage</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Major Outage</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> Maintenance</div>
            </div>
        </div>
    </header>

    <div id="app">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>Loading status data...</p>
        </div>
    </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
</div>

<!-- Toast notifications -->
<div class="toast" id="toast"></div>

<!-- Detail drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
    <div id="drawerContent"></div>
</div>

<script>
const STATUS_LABELS = {
    operational: 'Operational',
    degraded: 'Degraded Performance',
    partial_outage: 'Partial Outage',
    major_outage: 'Major Outage',
    maintenance: 'Under Maintenance',
    unknown: 'Unknown',
};

const SOURCE_TYPES = [
    { value: 'statuspage', label: 'Atlassian Statuspage' },
    { value: 'statushub', label: 'StatusHub' },
    { value: 'uptimerobot', label: 'UptimeRobot' },
    { value: 'cstate', label: 'cState' },
    { value: 'sorry', label: 'Sorry™' },
    { value: 'html_scrape', label: 'HTML Scrape' },
    { value: 'google_workspace', label: 'Google Workspace' },
    { value: 'microsoft_365', label: 'Microsoft 365' },
    { value: 'slack_status', label: 'Slack Status' },
    { value: 'gcp_status', label: 'GCP Status' },
    { value: 'exlibris', label: 'Ex Libris' },
];

let configData = null;
let statusData = {};
let feedData = {};
const ghRepo = 'DavidsonCollege/status-monitor';
let ghPat = '';
let ghConfigSha = '';
let manageMode = false;

// Detect base URL
const BASE_URL = (() => {
    const path = window.location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
    return window.location.origin + path;
})();

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
}

// ── Data Loading ─────────────────────────────────────────────────────────────
async function loadConfig() {
    try {
        const resp = await fetch(`${BASE_URL}/config/teams.json?_=${Date.now()}`);
        if (!resp.ok) {
            const resp2 = await fetch('config/teams.json');
            configData = await resp2.json();
            return;
        }
        configData = await resp.json();
    } catch (e) {
        console.error('Failed to load config:', e);
        try {
            const resp = await fetch('config/teams.json');
            configData = await resp.json();
        } catch (e2) {
            document.getElementById('app').innerHTML = '<p style="color:var(--red);padding:40px">Failed to load configuration. Please check the repository setup.</p>';
        }
    }
}

async function loadTeamStatus(teamId) {
    try {
        const resp = await fetch(`${BASE_URL}/feeds/${teamId}-status.json?_=${Date.now()}`);
        if (resp.ok) statusData[teamId] = await resp.json();
    } catch (e) { console.warn(`Failed to load status for ${teamId}:`, e); }
}

async function loadTeamFeed(teamId) {
    try {
        const resp = await fetch(`${BASE_URL}/feeds/${teamId}.json?_=${Date.now()}`);
        if (resp.ok) feedData[teamId] = await resp.json();
    } catch (e) { console.warn(`Failed to load feed for ${teamId}:`, e); }
}

async function init() {
    // Restore GitHub PAT from localStorage
    ghPat = localStorage.getItem('sm_pat') || '';

    await loadConfig();
    if (!configData) return;

    const teams = configData.teams || [];
    await Promise.all(teams.map(t => Promise.all([loadTeamStatus(t.id), loadTeamFeed(t.id)])));
    render();

    // Auto-refresh every 60 seconds
    setInterval(async () => {
        await Promise.all(teams.map(t => Promise.all([loadTeamStatus(t.id), loadTeamFeed(t.id)])));
        render();
    }, 60000);
}

// ── Rendering ────────────────────────────────────────────────────────────────
function render() {
    const teams = configData.teams || [];
    const app = document.getElementById('app');
    let html = '';
    for (const team of teams) {
        html += renderTeam(team);
    }
    html += '<button class="add-team-btn" onclick="openTeamModal()">+ Add Team</button>';
    app.innerHTML = html;
}

function renderTeam(team) {
    const teamIdx = configData.teams.indexOf(team);
    const status = statusData[team.id];
    const products = status ? status.products : team.products.map(p => ({
        id: p.id, name: p.name, icon_url: p.icon_url, status_url: p.status_url,
        overall_status: 'unknown', active_incidents: 0, components: [],
    }));

    let operational = 0, issues = 0;
    for (const p of products) {
        if (p.overall_status === 'operational') operational++;
        else issues++;
    }

    const summaryBadge = issues > 0
        ? `<span class="count-badge badge-orange">${issues} with issues</span>`
        : `<span class="count-badge badge-green">All operational</span>`;

    let lastChecked = '';
    if (status && status.last_checked) {
        lastChecked = `Last checked: ${new Date(status.last_checked).toLocaleString()}`;
    }

    let html = `<div class="team-section">`;
    html += `<div class="team-header" style="position:relative">`;
    html += `<h2>${team.name}</h2>`;
    html += `<div class="team-summary">${summaryBadge}<span style="font-size:12px;color:var(--text-muted)">${lastChecked}</span></div>`;
    html += `<div class="edit-overlay">
        <button onclick="event.stopPropagation();openTeamModal(${teamIdx})">Edit</button>
        <button class="delete-btn" onclick="event.stopPropagation();deleteTeam(${teamIdx})">Delete</button>
    </div>`;
    html += `</div>`;

    html += `<div class="status-grid">`;
    for (let pi = 0; pi < products.length; pi++) {
        html += renderProductCard(team.id, products[pi], teamIdx, pi);
    }
    html += `</div>`;
    html += `<button class="add-product-btn" onclick="openProductModal(${teamIdx})">+ Add Product</button>`;
    html += `</div>`;
    return html;
}

function renderProductCard(teamId, product, teamIdx, productIdx) {
    const status = product.overall_status || 'unknown';
    const label = STATUS_LABELS[status] || 'Unknown';
    const incidents = product.active_incidents || 0;
    const incidentText = incidents > 0 ? `${incidents} active incident${incidents !== 1 ? 's' : ''}` : '';

    return `<div class="status-card ${status}" onclick="openDrawer('${teamId}','${product.id}')" style="position:relative">
        <div class="card-top">
            ${product.icon_url ? `<img class="card-icon" src="${product.icon_url}" alt="${product.name}" onerror="this.style.display='none'">` : ''}
            <div class="card-name">${product.name}</div>
        </div>
        <div class="card-status">
            <div class="status-dot ${status}"></div>
            <span class="status-label ${status}">${label}</span>
        </div>
        ${incidentText ? `<div class="card-incidents">${incidentText}</div>` : ''}
        <div class="edit-overlay">
            <button onclick="event.stopPropagation();openProductModal(${teamIdx},${productIdx})">Edit</button>
            <button class="delete-btn" onclick="event.stopPropagation();deleteProduct(${teamIdx},${productIdx})">Delete</button>
        </div>
    </div>`;
}

// ── Drawer with Component Filtering ──────────────────────────────────────────
function openDrawer(teamId, productId) {
    const status = statusData[teamId];
    const team = configData.teams.find(t => t.id === teamId);
    const configProduct = team ? team.products.find(p => p.id === productId) : null;
    const product = status ? status.products.find(p => p.id === productId) : null;
    const feed = feedData[teamId] || [];

    const drawerContent = document.getElementById('drawerContent');
    let html = '';

    const name = product ? product.name : (configProduct ? configProduct.name : productId);
    const icon = product ? product.icon_url : (configProduct ? configProduct.icon_url : '');
    const overallStatus = product ? product.overall_status : 'unknown';
    const statusLabel = STATUS_LABELS[overallStatus] || 'Unknown';
    const statusUrl = product ? product.status_url : (configProduct ? configProduct.status_url : '');

    html += `<div class="drawer-header">
        <h3>${icon ? `<img class="card-icon" src="${icon}" alt="${name}" onerror="this.style.display='none'">` : ''} ${name}</h3>
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>`;

    html += `<div class="drawer-status-bar ${overallStatus}">
        <div class="status-dot ${overallStatus}"></div>
        ${statusLabel}
    </div>`;

    // Components with filter
    const components = product ? product.components : [];
    if (components && components.length > 0) {
        html += `<div class="drawer-section-title">Components (${components.length})</div>`;
        html += `<div class="component-filter">
            <input type="text" id="compFilter" placeholder="Filter components..." oninput="filterComponents()">
            <button class="filter-toggle" id="issuesToggle" onclick="toggleIssuesOnly()">Issues only</button>
        </div>`;
        html += `<div class="component-list" id="componentList">`;
        for (const comp of components) {
            const cs = comp.status || 'unknown';
            html += `<div class="component-row" data-name="${comp.name.toLowerCase()}" data-status="${cs}">
                <span>${comp.name}</span>
                <div class="component-status">
                    <div class="status-dot ${cs}"></div>
                    <span class="status-label ${cs}">${STATUS_LABELS[cs] || cs}</span>
                </div>
            </div>`;
        }
        html += `</div>`;
    }

    // Recent events from feed
    const productEvents = feed.filter(e => e.product_id === productId).slice(0, 15);
    if (productEvents.length > 0) {
        html += `<div class="drawer-section-title">Recent Events</div>`;
        for (const evt of productEvents) {
            const date = evt.date ? new Date(evt.date).toLocaleString() : '';
            html += `<div class="feed-event" style="border-left-color:${getStatusColor(evt.status || 'unknown')}">
                <div class="event-title">${evt.link ? `<a href="${evt.link}" target="_blank" style="color:var(--accent);text-decoration:none">${evt.title}</a>` : evt.title}</div>
                <div class="event-date">${date}</div>
                ${evt.summary ? `<div class="event-summary">${truncate(evt.summary, 200)}</div>` : ''}
            </div>`;
        }
    }

    if (statusUrl) {
        html += `<a class="status-link" href="${statusUrl}" target="_blank">View full status page →</a>`;
    }

    if (status && status.last_checked) {
        html += `<div class="last-checked">Last checked: ${new Date(status.last_checked).toLocaleString()}</div>`;
    }

    drawerContent.innerHTML = html;
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('drawer').classList.add('open');
}

let issuesOnly = false;
function filterComponents() {
    const query = (document.getElementById('compFilter')?.value || '').toLowerCase();
    const rows = document.querySelectorAll('#componentList .component-row');
    rows.forEach(row => {
        const name = row.dataset.name;
        const status = row.dataset.status;
        const matchesQuery = !query || name.includes(query);
        const matchesIssues = !issuesOnly || status !== 'operational';
        row.classList.toggle('hidden', !(matchesQuery && matchesIssues));
    });
}

function toggleIssuesOnly() {
    issuesOnly = !issuesOnly;
    document.getElementById('issuesToggle')?.classList.toggle('active', issuesOnly);
    filterComponents();
}

function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('drawer').classList.remove('open');
    issuesOnly = false;
}

// ── Manage Mode ──────────────────────────────────────────────────────────────
function toggleManageMode() {
    manageMode = !manageMode;
    document.body.classList.toggle('manage-mode', manageMode);
    document.getElementById('manageBtn').classList.toggle('active', manageMode);
}

function promptForPat() {
    return new Promise((resolve) => {
        const html = `
            <h3>GitHub Authentication</h3>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px">A Personal Access Token is needed to save changes. This is stored in your browser and only asked once.</p>
            <div class="form-group">
                <label>Personal Access Token</label>
                <input id="patPromptInput" type="password" placeholder="github_pat_..." />
            </div>
            <div class="modal-actions">
                <button onclick="closeModal();window._patResolve('')">Cancel</button>
                <button class="btn-primary" onclick="closeModal();window._patResolve(document.getElementById('patPromptInput').value.trim())">Save</button>
            </div>
        `;
        window._patResolve = resolve;
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modalOverlay').classList.add('open');
        setTimeout(() => document.getElementById('patPromptInput')?.focus(), 100);
    });
}

// ── GitHub Config Save ───────────────────────────────────────────────────────
async function saveConfigToGitHub() {
    if (!ghPat) {
        const token = await promptForPat();
        if (!token) return false;
        ghPat = token;
        localStorage.setItem('sm_pat', ghPat);
    }

    try {
        // Get current SHA
        const getResp = await fetch(`https://api.github.com/repos/${ghRepo}/contents/config/teams.json`, {
            headers: { 'Authorization': `Bearer ${ghPat}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!getResp.ok) throw new Error(`GitHub GET failed: ${getResp.status}`);
        const getData = await getResp.json();
        ghConfigSha = getData.sha;

        // Write updated config
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(configData, null, 2) + '\n')));
        const putResp = await fetch(`https://api.github.com/repos/${ghRepo}/contents/config/teams.json`, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${ghPat}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                message: 'Update teams.json via dashboard',
                content: content,
                sha: ghConfigSha,
            }),
        });

        if (!putResp.ok) {
            const err = await putResp.text();
            throw new Error(`GitHub PUT failed: ${putResp.status} ${err}`);
        }

        showToast('Configuration saved to GitHub');
        return true;
    } catch (e) {
        console.error('Save failed:', e);
        showToast('Failed to save: ' + e.message, true);
        return false;
    }
}

// ── Team Modal ───────────────────────────────────────────────────────────────
function openTeamModal(teamIdx) {
    const isEdit = teamIdx !== undefined;
    const team = isEdit ? configData.teams[teamIdx] : {};

    const html = `
        <h3>${isEdit ? 'Edit' : 'Add'} Team</h3>
        <div class="form-group">
            <label>Team Name</label>
            <input id="teamName" value="${team.name || ''}" placeholder="e.g. Digital Campus" />
        </div>
        <div class="form-group">
            <label>Team ID (lowercase, no spaces)</label>
            <input id="teamId" value="${team.id || ''}" placeholder="e.g. digital-campus" ${isEdit ? 'disabled style="opacity:0.6"' : ''} />
        </div>
        <div class="form-group">
            <label>Description</label>
            <input id="teamDesc" value="${team.description || ''}" placeholder="Optional description" />
        </div>
        <div class="form-group">
            <label>Slack Channel ID</label>
            <input id="teamSlack" value="${team.slack_channel || ''}" placeholder="e.g. C0AKTENQN49" />
        </div>
        <div class="form-group">
            <label>Zoom Channel ID</label>
            <input id="teamZoom" value="${team.zoom_channel || ''}" placeholder="e.g. 1cba8a62eebb4cf484dd7a7b07c3cd32" />
        </div>
        <div class="form-group">
            <label>Google Chat Webhook URL</label>
            <input id="teamGchat" value="${team.gchat_webhook || ''}" placeholder="https://chat.googleapis.com/v1/spaces/..." />
        </div>
        <div class="modal-actions">
            <button onclick="closeModal()">Cancel</button>
            <button class="btn-primary" onclick="saveTeam(${isEdit ? teamIdx : 'undefined'})">Save</button>
        </div>
    `;

    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('open');
}

async function saveTeam(teamIdx) {
    const name = document.getElementById('teamName').value.trim();
    const id = document.getElementById('teamId').value.trim();
    const desc = document.getElementById('teamDesc').value.trim();
    const slack = document.getElementById('teamSlack').value.trim();
    const zoom = document.getElementById('teamZoom').value.trim();
    const gchat = document.getElementById('teamGchat').value.trim();

    if (!name || !id) { showToast('Name and ID are required', true); return; }

    if (teamIdx !== undefined) {
        // Edit existing
        configData.teams[teamIdx].name = name;
        configData.teams[teamIdx].description = desc;
        configData.teams[teamIdx].slack_channel = slack;
        configData.teams[teamIdx].zoom_channel = zoom;
        configData.teams[teamIdx].gchat_webhook = gchat;
    } else {
        // Add new
        configData.teams.push({
            id, name, description: desc,
            slack_channel: slack, zoom_channel: zoom,
            gchat_webhook: gchat,
            products: [],
        });
    }

    closeModal();
    render();

    if (await saveConfigToGitHub()) {
        showToast('Team saved');
    }
}

async function deleteTeam(teamIdx) {
    const team = configData.teams[teamIdx];
    if (!confirm(`Delete team "${team.name}" and all its products?`)) return;

    configData.teams.splice(teamIdx, 1);
    render();

    if (await saveConfigToGitHub()) {
        showToast('Team deleted');
    }
}

// ── Product Modal ────────────────────────────────────────────────────────────
function openProductModal(teamIdx, productIdx) {
    const isEdit = productIdx !== undefined;
    const product = isEdit ? configData.teams[teamIdx].products[productIdx] : {};
    const source = product.source || {};

    let sourceTypeOptions = SOURCE_TYPES.map(s =>
        `<option value="${s.value}" ${source.type === s.value ? 'selected' : ''}>${s.label}</option>`
    ).join('');

    const html = `
        <h3>${isEdit ? 'Edit' : 'Add'} Product</h3>
        <div class="form-group">
            <label>Product Name</label>
            <input id="prodName" value="${product.name || ''}" placeholder="e.g. Zoom" />
        </div>
        <div class="form-group">
            <label>Product ID (lowercase, no spaces)</label>
            <input id="prodId" value="${product.id || ''}" placeholder="e.g. zoom" ${isEdit ? 'disabled style="opacity:0.6"' : ''} />
        </div>
        <div class="form-group">
            <label>Domain (for favicon)</label>
            <input id="prodDomain" value="${product.domain || ''}" placeholder="e.g. zoom.us" />
        </div>
        <div class="form-group">
            <label>Status Page URL</label>
            <input id="prodStatusUrl" value="${product.status_url || ''}" placeholder="https://status.zoom.us" />
        </div>
        <div class="form-group">
            <label>Source Type</label>
            <select id="prodSourceType">${sourceTypeOptions}</select>
        </div>
        <div class="form-group">
            <label>API Base URL</label>
            <input id="prodApiBase" value="${source.api_base || ''}" placeholder="https://status.zoom.us" />
        </div>
        <div class="form-group">
            <label>Component Filter (comma-separated, optional)</label>
            <input id="prodCompFilter" value="${(source.component_filter || []).join(', ')}" placeholder="e.g. Zoom Meetings, Zoom Phone" />
        </div>
        <div class="form-group">
            <label>Region Filter (comma-separated, optional)</label>
            <input id="prodRegionFilter" value="${(source.region_filter || []).join(', ')}" placeholder="e.g. United States" />
        </div>
        <div class="form-group">
            <label>Incident Region Exclude (comma-separated, optional)</label>
            <textarea id="prodRegionExclude" placeholder="e.g. LATAM, EMEA, APAC, Asia, Europe">${(source.incident_region_exclude || []).join(', ')}</textarea>
        </div>
        <div class="modal-actions">
            <button onclick="closeModal()">Cancel</button>
            <button class="btn-primary" onclick="saveProduct(${teamIdx}, ${isEdit ? productIdx : 'undefined'})">Save</button>
        </div>
    `;

    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('open');
}

function parseCommaList(str) {
    return str.split(',').map(s => s.trim()).filter(s => s.length > 0);
}

async function saveProduct(teamIdx, productIdx) {
    const name = document.getElementById('prodName').value.trim();
    const id = document.getElementById('prodId').value.trim();
    const domain = document.getElementById('prodDomain').value.trim();
    const statusUrl = document.getElementById('prodStatusUrl').value.trim();
    const sourceType = document.getElementById('prodSourceType').value;
    const apiBase = document.getElementById('prodApiBase').value.trim();
    const compFilter = parseCommaList(document.getElementById('prodCompFilter').value);
    const regionFilter = parseCommaList(document.getElementById('prodRegionFilter').value);
    const regionExclude = parseCommaList(document.getElementById('prodRegionExclude').value);

    if (!name || !id) { showToast('Name and ID are required', true); return; }

    const source = { type: sourceType };
    if (apiBase) source.api_base = apiBase;
    if (compFilter.length) source.component_filter = compFilter;
    if (regionFilter.length) source.region_filter = regionFilter;
    if (regionExclude.length) source.incident_region_exclude = regionExclude;

    const product = {
        id, name, domain,
        icon_url: domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=64` : '',
        status_url: statusUrl,
        source,
    };

    if (productIdx !== undefined) {
        configData.teams[teamIdx].products[productIdx] = product;
    } else {
        configData.teams[teamIdx].products.push(product);
    }

    closeModal();
    render();

    if (await saveConfigToGitHub()) {
        showToast('Product saved');
    }
}

async function deleteProduct(teamIdx, productIdx) {
    const product = configData.teams[teamIdx].products[productIdx];
    if (!confirm(`Delete "${product.name}"?`)) return;

    configData.teams[teamIdx].products.splice(productIdx, 1);
    render();

    if (await saveConfigToGitHub()) {
        showToast('Product deleted');
    }
}

// ── Modal helpers ────────────────────────────────────────────────────────────
function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
}

// ── Utilities ────────────────────────────────────────────────────────────────
function getStatusColor(status) {
    const colors = {
        operational: '#2fcc66', degraded: '#f1c40f', partial_outage: '#e67e22',
        major_outage: '#e74c3c', maintenance: '#3498db', unknown: '#95a5a6',
    };
    return colors[status] || colors.unknown;
}

function truncate(str, max) {
    if (!str) return '';
    return str.length > max ? str.substring(0, max) + '…' : str;
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        if (document.getElementById('modalOverlay').classList.contains('open')) closeModal();
        else closeDrawer();
    }
});

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// Initialize
init();
</script>
