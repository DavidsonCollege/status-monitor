name: Notify Dashboard Change Request

on:
  pull_request:
    types: [opened]
    branches: [main]

jobs:
  notify:
    if: startsWith(github.head_ref, 'dashboard-change/')
    runs-on: ubuntu-latest
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Dashboard Change Request: ${{ github.event.pull_request.title }}"
          to: nacolvin@davidson.edu
          from: ${{ secrets.SMTP_USERNAME }}
          html_body: |
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <style>
                    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #1a1a1a; margin: 0; padding: 0; background: #f5f5f5; }
                    .container { max-width: 560px; margin: 24px auto; background: #ffffff; border-radius: 8px; border: 1px solid #e0e0e0; overflow: hidden; }
                    .header { background: #0f172a; padding: 20px 24px; color: #ffffff; }
                    .header h2 { margin: 0; font-size: 18px; font-weight: 600; }
                    .body { padding: 24px; }
                    .label { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
                    .value { font-size: 15px; margin-bottom: 16px; }
                    .btn { display: inline-block; padding: 10px 20px; background: #3b82f6; color: #ffffff; text-decoration: none; border-radius: 6px; font-weight: 500; font-size: 14px; }
                    .btn-secondary { background: #e2e8f0; color: #1e293b; margin-left: 8px; }
                    .footer { padding: 16px 24px; border-top: 1px solid #e0e0e0; font-size: 12px; color: #666; }
                </style>
            </head>
            <body>
                <div class="container">
                    <div class="header">
                        <h2>New Dashboard Change Request</h2>
                    </div>
                    <div class="body">
                        <div class="label">Change</div>
                        <div class="value">${{ github.event.pull_request.title }}</div>
                        <div class="label">Submitted</div>
                        <div class="value">${{ github.event.pull_request.created_at }}</div>
                        <div class="label">Repository</div>
                        <div class="value">${{ github.repository }}</div>
                        <p style="margin: 20px 0 0">
                            <a href="${{ github.event.pull_request.html_url }}" class="btn">Review on GitHub</a>
                            <a href="https://davidsoncollegeits.github.io/${{ github.event.repository.name }}/admin.html" class="btn btn-secondary">Open Admin Dashboard</a>
                        </p>
                    </div>
                    <div class="footer">
                        This notification was sent because a change was submitted via the public dashboard.
                    </div>
                </div>
            </body>
            </html>
